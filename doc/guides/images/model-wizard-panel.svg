<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="520" fill="#26282b"/>
  <!-- panel -->
  <rect x="30" y="20" width="360" height="480" rx="8" fill="#303236" stroke="#1d1e20"/>
  <text x="50" y="52" font-size="16" font-weight="bold" fill="#e8e8e8">PoseCap</text>

  <rect x="46" y="66" width="328" height="290" rx="6" fill="#383a3f" stroke="#26282b"/>
  <text x="62" y="92" font-size="14" font-weight="bold" fill="#e8e8e8">Body Models — one-time setup</text>

  <text x="62" y="120" font-size="12" fill="#c9c9c9">1. Create free accounts (same email + password):</text>
  <rect x="62" y="130" width="90" height="26" rx="4" fill="#4a4d53"/>
  <text x="86" y="147" font-size="12" fill="#e8e8e8">SMPL</text>
  <rect x="158" y="130" width="90" height="26" rx="4" fill="#4a4d53"/>
  <text x="176" y="147" font-size="12" fill="#e8e8e8">SMPL-X</text>
  <rect x="254" y="130" width="90" height="26" rx="4" fill="#4a4d53"/>
  <text x="276" y="147" font-size="12" fill="#e8e8e8">FLAME</text>

  <text x="62" y="182" font-size="12" fill="#c9c9c9">2. Enter that email and password (never saved):</text>
  <rect x="62" y="192" width="282" height="26" rx="4" fill="#232427" stroke="#4a4d53"/>
  <text x="72" y="209" font-size="12" fill="#9a9a9a">Email</text>
  <rect x="62" y="224" width="282" height="26" rx="4" fill="#232427" stroke="#4a4d53"/>
  <text x="72" y="241" font-size="12" fill="#9a9a9a">Password  ••••••••</text>

  <rect x="62" y="262" width="282" height="30" rx="4" fill="#2f6fed"/>
  <text x="112" y="282" font-size="13" font-weight="bold" fill="#ffffff">Download &amp; Install Models</text>

  <text x="62" y="314" font-size="11" fill="#9a9a9a">Prefer the browser? Download the files yourself and</text>
  <rect x="62" y="322" width="282" height="26" rx="4" fill="#4a4d53"/>
  <text x="112" y="339" font-size="12" fill="#e8e8e8">Watch my Downloads Folder</text>

  <!-- status -->
  <rect x="46" y="368" width="328" height="34" rx="6" fill="#243b24" stroke="#2e7d32"/>
  <text x="62" y="390" font-size="13" fill="#a5d6a7">✓ Models installed — doctor check passed.</text>

  <!-- callouts right side -->
  <rect x="430" y="66" width="300" height="120" rx="8" fill="#fff8e1" stroke="#e0b400"/>
  <text x="446" y="92" font-size="13" font-weight="bold" fill="#7a6200">Where is this panel?</text>
  <text x="446" y="114" font-size="12" fill="#7a6200">Blender 3D Viewport → press N →</text>
  <text x="446" y="132" font-size="12" fill="#7a6200">PoseCap tab. The section only</text>
  <text x="446" y="150" font-size="12" fill="#7a6200">appears while model files are</text>
  <text x="446" y="168" font-size="12" fill="#7a6200">missing.</text>

  <rect x="430" y="210" width="300" height="130" rx="8" fill="#e3f2fd" stroke="#5c9bd6"/>
  <text x="446" y="236" font-size="13" font-weight="bold" fill="#1a4f7a">Your password is safe</text>
  <text x="446" y="258" font-size="12" fill="#1a4f7a">It is used once, in memory, to</text>
  <text x="446" y="276" font-size="12" fill="#1a4f7a">download from the official MPI</text>
  <text x="446" y="294" font-size="12" fill="#1a4f7a">server — never written to disk,</text>
  <text x="446" y="312" font-size="12" fill="#1a4f7a">never logged, cleared from the</text>
  <text x="446" y="330" font-size="12" fill="#1a4f7a">field as soon as it starts.</text>

  <rect x="430" y="364" width="300" height="120" rx="8" fill="#ede7f6" stroke="#8e7cc3"/>
  <text x="446" y="390" font-size="13" font-weight="bold" fill="#4a3880">Downloads take a while</text>
  <text x="446" y="412" font-size="12" fill="#4a3880">The archives total ~500 MB.</text>
  <text x="446" y="430" font-size="12" fill="#4a3880">The status line shows which file</text>
  <text x="446" y="448" font-size="12" fill="#4a3880">is downloading; the doctor check</text>
  <text x="446" y="466" font-size="12" fill="#4a3880">turns green when finished.</text>
</svg>
